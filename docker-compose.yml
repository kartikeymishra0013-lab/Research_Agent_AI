# ============================================================
# Scientific Document Intelligence Pipeline — Docker Compose
# Services: pipeline | api | chromadb | neo4j
# ============================================================
# Usage:
#   make up          → Start all services
#   make run         → Run pipeline on data/input/
#   make api         → Start the REST API server
#   make down        → Stop all services
# ============================================================

version: "3.9"

# ─── Shared network ───────────────────────────────────────────
networks:
  pipeline-net:
    driver: bridge

# ─── Persistent volumes ───────────────────────────────────────
volumes:
  chromadb-data:
    name: sdip_chromadb_data
  neo4j-data:
    name: sdip_neo4j_data
  neo4j-logs:
    name: sdip_neo4j_logs
  pipeline-output:
    name: sdip_pipeline_output

# ─── Services ─────────────────────────────────────────────────
services:

  # ── Main Pipeline Application (batch processing) ─────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: sdip-pipeline:latest
    container_name: sdip-pipeline
    restart: unless-stopped
    networks:
      - pipeline-net
    depends_on:
      chromadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data/input:/app/data/input
      - ./data/output:/app/data/output
      - ./config:/app/config:ro
    command: >
      python -m src.main run --dir data/input/
    profiles:
      - run

  # ── REST API (FastAPI + Uvicorn) ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: sdip-pipeline:latest
    container_name: sdip-api
    restart: unless-stopped
    networks:
      - pipeline-net
    depends_on:
      chromadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data/input:/app/data/input
      - ./data/output:/app/data/output
      - ./config:/app/config:ro
    ports:
      - "${API_PORT:-8080}:8080"
    command: >
      uvicorn src.api.app:app --host 0.0.0.0 --port 8080 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - api

  # ── Pipeline Interactive Shell ────────────────────────────────
  pipeline-shell:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: sdip-pipeline:latest
    container_name: sdip-pipeline-shell
    networks:
      - pipeline-net
    depends_on:
      - chromadb
      - neo4j
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data/input:/app/data/input
      - ./data/output:/app/data/output
      - ./config:/app/config:ro
      # Mount source for live development
      - ./src:/app/src
    stdin_open: true
    tty: true
    command: /bin/bash
    profiles:
      - dev

  # ── ChromaDB Vector Store ─────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: sdip-chromadb
    restart: unless-stopped
    networks:
      - pipeline-net
    ports:
      - "${CHROMADB_PORT:-8000}:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Neo4j Knowledge Graph ─────────────────────────────────────
  neo4j:
    image: neo4j:5.15-community
    container_name: sdip-neo4j
    restart: unless-stopped
    networks:
      - pipeline-net
    ports:
      - "${NEO4J_BROWSER_PORT:-7474}:7474"    # HTTP Browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687"        # Bolt protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=512m
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
