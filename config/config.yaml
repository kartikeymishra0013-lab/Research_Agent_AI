# ============================================================
# Scientific Document Intelligence Pipeline — Configuration
# ============================================================
# All values support environment variable substitution: ${VAR_NAME}
# Override any setting via CLI flags or environment variables.
# ============================================================

# ─── Pipeline Behavior ────────────────────────────────────────
pipeline:
  # Mode controls which pipeline stages are executed:
  #   full         - extract + embed + graph + summarize (default)
  #   extract_only - structured extraction and summaries only
  #   search_only  - embedding and semantic search only
  #   graph_only   - knowledge graph construction only
  mode: full

  # OpenAI model for the agent and all extraction tasks
  model: gpt-4o

  # Model temperature (0.0 = deterministic, 1.0 = creative)
  temperature: 0.1

  # Default schema for extraction (research_paper | patent | default)
  schema_type: default

  # Maximum agentic loop iterations per document
  max_iterations: 20

# ─── OpenAI ───────────────────────────────────────────────────
openai:
  api_key: ${OPENAI_API_KEY}
  # Embedding model for ChromaDB vector storage
  embedding_model: text-embedding-3-small

# ─── ChromaDB Vector Store ────────────────────────────────────
chromadb:
  host: ${CHROMADB_HOST:-chromadb}
  port: ${CHROMADB_PORT:-8000}
  # Collection name for document chunks
  collection: documents
  # Similarity metric: cosine | l2 | ip
  distance_metric: cosine

# ─── Neo4j Knowledge Graph ────────────────────────────────────
neo4j:
  uri: ${NEO4J_URI:-bolt://neo4j:7687}
  username: ${NEO4J_USERNAME:-neo4j}
  password: ${NEO4J_PASSWORD:-password}
  database: neo4j

# ─── Document Loaders ─────────────────────────────────────────
loaders:
  pdf:
    # OCR fallback for scanned PDFs (triggers when words/page < threshold)
    ocr_enabled: true
    ocr_dpi: 300
    ocr_language: eng
    ocr_words_threshold: 10  # pages below this words/page trigger OCR
    extract_images: false

  docx:
    include_tables: true
    include_headers: true

  text:
    encoding: utf-8
    strip_markdown: false

  web:
    timeout: 30
    use_trafilatura: true
    user_agent: ScientificDocumentIntelligencePipeline/2.0

# ─── Text Chunking ────────────────────────────────────────────
chunking:
  # Strategy: sentence | paragraph | fixed | semantic
  # Use "semantic" for best retrieval quality (requires embedding API calls)
  strategy: sentence
  chunk_size: 1500
  chunk_overlap: 200
  min_chunk_size: 100

  # SemanticChunker parameters (only used when strategy = "semantic")
  similarity_threshold: 0.65   # cosine similarity below which a split is inserted
  sentence_group_size: 3       # sentences per embedding window

# ─── Parallel Processing ──────────────────────────────────────
processing:
  # Number of parallel workers for directory batch processing
  max_workers: 4
  # Re-process files already in the registry (override with --force CLI flag)
  force_reprocess: false

# ─── Processing Registry (deduplication) ─────────────────────
registry:
  # Path to the JSON file storing content-hash → processed status
  path: data/output/registry.json

# ─── OCR Settings ─────────────────────────────────────────────
# (Also controllable per-loader under loaders.pdf above)
ocr:
  enabled: true
  dpi: 300
  language: eng
  words_per_page_threshold: 10

# ─── REST API ─────────────────────────────────────────────────
api:
  host: 0.0.0.0
  port: 8080
  # Number of Uvicorn worker processes (≥2 for production)
  workers: 2
  # CORS origins (comma-separated, or * for all)
  cors_origins: "*"

# ─── Cost Tracking ────────────────────────────────────────────
cost_tracking:
  # Log a warning when total pipeline cost exceeds this threshold (USD)
  warn_threshold_usd: 1.0
  # Include cost summary in each run result JSON
  include_in_results: true

# ─── Output ───────────────────────────────────────────────────
output:
  # Directory for all output files (JSON, JSONL, reports)
  dir: data/output
  # Always pretty-print JSON output files
  pretty_print: true
  # Append all extractions to a master JSONL dataset file
  dataset_name: extractions

# ─── Logging ──────────────────────────────────────────────────
logging:
  level: ${LOG_LEVEL:-INFO}
  # Optional file path for persistent log output
  file: null  # e.g. data/output/pipeline.log
